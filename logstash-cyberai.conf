input {
  file {
    path => "/var/log/zeek/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "zeek"
  }
  file {
    path => "/var/log/suricata/eve.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "suricata"
    codec => "json"
  }
}

filter {
  if [type] == "zeek" {
    # This parses the tab-separated Zeek conn.log into specific fields
    csv {
      columns => ["ts","uid","id.orig_h","id.orig_p","id.resp_h","id.resp_p","proto","service","duration","orig_bytes","resp_bytes","conn_state","local_orig","local_resp","missed_bytes","history","orig_pkts","orig_ip_bytes","resp_pkts","resp_ip_bytes","tunnel_parents"]
      separator => "	" 
    }
    
    # Converts the Unix timestamp 'ts' into a format Kibana understands
    date {
      match => [ "ts", "UNIX" ]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "%{type}-%{+YYYY.MM.dd}"
  }
}
